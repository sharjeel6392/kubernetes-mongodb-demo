apiVersion: v1
kind: Service
metadata:
  name: mongo-express-service
spec:
  selector:
    app: mongo-express
  type: LoadBalancer    # Use LoadBalancer for external access
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081
    nodePort: 30000     # Optional: Specify a node port for external access (default range is 30000-32767)
    
